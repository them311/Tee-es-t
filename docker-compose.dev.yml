##
## SNB — local dev stack.
## Runs Postgres, Redis, and the snb Python package in a hot-reload container.
## Separate from docker-compose.yml so existing services stay untouched.
##
## Usage:
##   docker compose -f docker-compose.dev.yml up --build
##   docker compose -f docker-compose.dev.yml run --rm snb snb info
##

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: snb
      POSTGRES_PASSWORD: snb
      POSTGRES_DB: snb
    ports:
      - "5432:5432"
    volumes:
      - snb-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snb"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  snb:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /app
    env_file:
      - .env
    environment:
      DB_URL: postgresql+asyncpg://snb:snb@postgres:5432/snb
      REDIS_URL: redis://redis:6379/0
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    volumes:
      - .:/app
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    command: ["snb", "info"]
    tty: true
    stdin_open: true

volumes:
  snb-pg:
