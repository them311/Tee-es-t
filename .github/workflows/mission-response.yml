name: Generer reponse de mission

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Plateforme cible'
        required: true
        default: 'codeur'
        type: choice
        options:
          - codeur
          - malt
          - freelance-info
          - upwork
          - fiverr
          - linkedin
          - other
      mission_text:
        description: 'Texte complet de la mission (copier-coller depuis la plateforme)'
        required: true
        type: string
      budget:
        description: 'Budget indicatif communique (ex : 3000 EUR, TJM 600)'
        required: false
        default: ''
        type: string
      urgency:
        description: 'Urgence ou delai (ex : demarrage sous 2 semaines)'
        required: false
        default: ''
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        working-directory: commercial-agent
        run: pip install -r requirements.txt

      - name: Prepare mission file
        working-directory: commercial-agent
        env:
          MISSION_TEXT: ${{ github.event.inputs.mission_text }}
        run: |
          printf '%s' "$MISSION_TEXT" > /tmp/mission.txt
          echo "Mission length: $(wc -c < /tmp/mission.txt) chars"

      - name: Generate response
        working-directory: commercial-agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python mission_responder.py \
            --platform "${{ github.event.inputs.platform }}" \
            --budget "${{ github.event.inputs.budget }}" \
            --urgency "${{ github.event.inputs.urgency }}" \
            --mission-file /tmp/mission.txt \
            --save > /tmp/response.txt
          echo "=== RESPONSE ==="
          cat /tmp/response.txt

      - name: Commit generated response
        working-directory: .
        run: |
          git config user.name "Mission Responder"
          git config user.email "robot@snbbm-consulting.com"
          git add docs/missions/
          if git diff --staged --quiet; then
            echo "Aucun changement a committer."
          else
            git commit -m "Nouvelle reponse ${{ github.event.inputs.platform }}"
            git pull --rebase origin main
            git push
          fi

      - name: Upload response as artifact
        uses: actions/upload-artifact@v4
        with:
          name: mission-response
          path: /tmp/response.txt
          retention-days: 30
