name: deploy-snb

# Manual deploy only — never triggered on push/PR to avoid surprise
# production rollouts. Requires FLY_API_TOKEN in repo secrets.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm production deploy'
        required: true
        default: ''

concurrency:
  group: deploy-snb
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event.inputs.confirm == 'deploy' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --config fly.snb.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
