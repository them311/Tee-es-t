name: Commercial Agent CI

on:
  push:
    branches: [main]
    paths:
      - "commercial-agent/**"
      - ".github/workflows/commercial-agent-ci.yml"
  pull_request:
    paths:
      - "commercial-agent/**"
      - ".github/workflows/commercial-agent-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: commercial-agent

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: commercial-agent/requirements-dev.txt

      - name: Install
        run: pip install -r requirements-dev.txt

      - name: Test
        run: pytest tests/ -q
