[build]
  publish = "docs"

# No build command needed — static site served directly from docs/

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=300"

[[headers]]
  for = "/status.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
